<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Discord Bot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            height: 100vh;
        }
        .login-card {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .login-card h2 {
            margin-bottom: 2rem;
            font-size: 2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .discord-btn {
            background-color: #5865F2;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .discord-btn:hover {
            background-color: #4752C4;
        }
        .error {
            color: var(--danger-color);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="glass-panel login-card animate-fade-in">
            <h2>Bot Dashboard</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Đăng nhập để theo dõi và quản lý máy chủ.</p>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <a href="/auth/login" class="btn discord-btn">
                <svg width="24" height="24" viewBox="0 0 127.14 96.36" fill="white">
                    <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.1,46,96,53,91.08,65.69,84.69,65.69Z"/>
                </svg>
                Login with Discord
            </a>
        </div>
    </div>
</body>
</html>
